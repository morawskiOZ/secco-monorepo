name: Build and Push CMS Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit semver (optional). Blank = auto patch-bump from last cms-v*.*.* tag."
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            if ! echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
              echo "::error::Invalid semver: $VERSION"
              exit 1
            fi
          else
            git fetch --tags --quiet
            LAST=$(git tag -l 'cms-v*' | grep -E '^cms-v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,4}$' | sort -V | tail -1)
            if [ -z "$LAST" ]; then
              VERSION="0.0.1"
            else
              IFS=. read -r MAJ MIN PAT <<< "${LAST#cms-v}"
              VERSION="$MAJ.$MIN.$((PAT+1))"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check tag not taken
        run: |
          TAG="cms-v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build renderer tarball
        working-directory: secco_renderer
        run: |
          npm ci
          npm pack
          mv secco-render-*.tgz ../secco_cms/secco-render-1.0.0.tgz

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        working-directory: secco_cms
        run: task login

      - name: Build and push
        env:
          GITHUB_REPO: ${{ github.repository }}/secco-cms
          TAG: ${{ steps.ver.outputs.version }}
        working-directory: secco_cms
        run: task build-push

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "cms-v${{ steps.ver.outputs.version }}" -m "CMS release v${{ steps.ver.outputs.version }}"
          git push origin "cms-v${{ steps.ver.outputs.version }}"
